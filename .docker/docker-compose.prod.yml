# =============================================================================
# LEGACY / NON-PRODUCTION. Do not use for production deployments.
# The only supported production path is k3s + Helm — see DEPLOY.md and
# k8s-cluster/docs/k3s-production-deploy.md in the monorepo root.
# =============================================================================
services:
  bot:
    image: ${DOCKERHUB_USERNAME}/${PROJECT_NAME}:latest
    container_name: ${PROJECT_NAME}
    restart: unless-stopped
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - REDIS_MAX_IDLE=${REDIS_MAX_IDLE}
      - REDIS_MAX_ACTIVE=${REDIS_MAX_ACTIVE}
      - REDIS_IDLE_TIMEOUT=${REDIS_IDLE_TIMEOUT}
      - REDIS_WAIT=${REDIS_WAIT}
      - REDIS_CONNECTION_TIMEOUT=${REDIS_CONNECTION_TIMEOUT}
      - REDIS_READ_TIMEOUT=${REDIS_READ_TIMEOUT}
      - REDIS_WRITE_TIMEOUT=${REDIS_WRITE_TIMEOUT}
      - TOKEN_BUCKET_RATE=${TOKEN_BUCKET_RATE:-30}
